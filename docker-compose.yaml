services: 
  tash-1: 
    image: nats
    container_name: tash-1
    command: -c /etc/my-server.conf --name tash-1 -p 4222
    volumes: 
      - ./server.conf:/etc/my-server.conf
    ports: 
      - 4222:4222

  tash-2: 
    image: nats
    container_name: tash-2
    command: -c /etc/my-server.conf --name tash-2 -p 4223
    volumes: 
      - ./server.conf:/etc/my-server.conf
    ports: 
      - 4223:4223
      
  tash-3: 
    image: nats
    container_name: tash-3
    command: -c /etc/my-server.conf --name tash-3 -p 4224
    volumes: 
      - ./server.conf:/etc/my-server.conf
    ports: 
      - 4224:4224